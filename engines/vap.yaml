# Native ValidatingAdmissionPolicy (CEL) implementations of the corpus (R01–R15).
# Requires Kubernetes >= 1.30 (VAP GA). One policy + one binding per requirement.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: r01-disallow-privileged
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods]
  validations:
    - expression: >-
        object.spec.containers.all(c, !has(c.securityContext) || !has(c.securityContext.privileged) || c.securityContext.privileged == false)
        && (!has(object.spec.initContainers) || object.spec.initContainers.all(c, !has(c.securityContext) || !has(c.securityContext.privileged) || c.securityContext.privileged == false))
      message: "R01: privileged containers are not allowed"
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: r01-disallow-privileged
spec:
  policyName: r01-disallow-privileged
  validationActions: [Deny]
  matchResources:
    namespaceSelector:
      matchLabels: {bench: "true"}
---
