---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: r13requirereadonlyrootfs
spec:
  crd:
    spec:
      names: {kind: R13RequireReadonlyRootfs}
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package r13
        violation[{"msg": msg}] {
          c := input.review.object.spec.containers[_]
          not c.securityContext.readOnlyRootFilesystem == true
          msg := sprintf("R13: readOnlyRootFilesystem must be true on %v", [c.name])
        }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: r14disallowdefaultsaautomount
spec:
  crd:
    spec:
      names: {kind: R14DisallowDefaultSaAutomount}
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package r14
        uses_default_sa {
          sa := object.get(input.review.object.spec, "serviceAccountName", "default")
          sa == "default"
        }
        violation[{"msg": msg}] {
          uses_default_sa
          not input.review.object.spec.automountServiceAccountToken == false
          msg := "R14: default SA token automount must be disabled"
        }
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: r15requireseccomp
spec:
  crd:
    spec:
      names: {kind: R15RequireSeccomp}
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package r15
        pod_ok {
          input.review.object.spec.securityContext.seccompProfile.type == "RuntimeDefault"
        }
        all_containers_ok {
          containers := input.review.object.spec.containers
          count([c | c := containers[_]; c.securityContext.seccompProfile.type == "RuntimeDefault"]) == count(containers)
        }
        violation[{"msg": msg}] {
          not pod_ok
          not all_containers_ok
          msg := "R15: seccompProfile.type=RuntimeDefault required"
        }
